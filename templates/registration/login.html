{% extends "base.html" %}

{% block title %}Entrar{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow-sm mt-5">
      <div class="card-body p-4">
        <h5 class="card-title text-center mb-3">Fechamento Contábil</h5>
        {% if form.errors %}
        <div class="alert alert-danger py-2 small">Usuário ou senha inválidos.</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label small">Usuário</label>
            <input type="text" name="username" class="form-control" autofocus required>
          </div>
          <div class="mb-3">
            <label class="form-label small">Senha</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
