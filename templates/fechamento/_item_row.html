{% load fechamento_extras %}
{% now "Y-m-d" as hoje_iso %}
<div id="item-{{ s.id }}"
     class="d-flex flex-wrap align-items-center gap-2 px-3 py-2 border-bottom checklist-row{% if atrasado %} bg-danger-subtle{% endif %}">
  <div class="me-auto">
    <span class="{% if s.concluido %}text-decoration-line-through text-muted{% endif %}">{{ nome|default:s.item.nome|sufixo }}</span>
    {% if atrasado %}<span class="badge text-bg-danger ms-1"><i class="bi bi-exclamation-triangle-fill"></i> vencido</span>{% endif %}
  </div>

  {% if s.status == 'feito' %}
  <input type="date" name="data" class="form-control form-control-sm" style="width: 150px;"
         value="{% if s.data %}{{ s.data|date:'Y-m-d' }}{% else %}{{ hoje_iso }}{% endif %}"
         title="Data de conclusão — altere se não foi hoje"
         hx-post="{% url 'item_set' s.id %}" hx-vals='{"status": "feito"}'
         hx-trigger="change" hx-target="#item-{{ s.id }}" hx-swap="outerHTML">
  {% endif %}

  <div class="btn-group btn-group-sm" role="group" aria-label="Estado do item">
    <button type="button" title="Feito" aria-label="Marcar como feito"
            class="btn {% if s.status == 'feito' %}btn-success{% else %}btn-outline-success{% endif %}"
            hx-post="{% url 'item_set' s.id %}" hx-vals='{"status": "feito"}'
            hx-target="#item-{{ s.id }}" hx-swap="outerHTML">
      <i class="bi bi-check-lg"></i>
    </button>
    <button type="button"
            class="btn {% if s.status == 'na' %}btn-secondary{% else %}btn-outline-secondary{% endif %}"
            hx-post="{% url 'item_set' s.id %}" hx-vals='{"status": "na"}'
            hx-target="#item-{{ s.id }}" hx-swap="outerHTML">N/A</button>
    <button type="button"
            class="btn btn-outline-secondary {% if s.status == 'pendente' %}disabled{% endif %}"
            title="Limpar (voltar a pendente)"
            hx-post="{% url 'item_set' s.id %}" hx-vals='{"status": "pendente"}'
            hx-target="#item-{{ s.id }}" hx-swap="outerHTML">
      <i class="bi bi-arrow-counterclockwise"></i>
    </button>
  </div>
</div>
