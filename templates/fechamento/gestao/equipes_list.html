{% extends "base.html" %}

{% block title %}Equipes{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb small">
    <li class="breadcrumb-item"><a href="{% url 'gestao_home' %}">Gestão</a></li>
    <li class="breadcrumb-item active">Equipes</li>
  </ol>
</nav>

<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">Equipes</h4>
  <a href="{% url 'equipe_criar' %}" class="btn btn-primary btn-sm">
    <i class="bi bi-plus-lg"></i> Nova equipe
  </a>
</div>

<div class="card shadow-sm">
  <div class="table-responsive">
    <table class="table table-sm table-hover align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th>Equipe</th>
          <th class="text-center">Empresas</th>
          <th style="width: 90px;"></th>
        </tr>
      </thead>
      <tbody>
        {% for e in equipes %}
        <tr>
          <td class="fw-semibold">{{ e.nome }}</td>
          <td class="text-center">{{ e.qtd_empresas }}</td>
          <td><a href="{% url 'equipe_editar' e.id %}" class="btn btn-sm btn-outline-primary py-0">Editar</a></td>
        </tr>
        {% empty %}
        <tr><td colspan="3" class="text-center text-muted py-3">Nenhuma equipe cadastrada.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
