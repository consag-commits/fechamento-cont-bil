<td id="ativa-{{ e.id }}">
  <button type="button"
          class="btn btn-sm p-0 border-0 bg-transparent"
          hx-post="{% url 'empresa_toggle_ativa' e.id %}"
          hx-target="#ativa-{{ e.id }}"
          hx-swap="outerHTML"
          title="Clique para {% if e.ativa %}desativar{% else %}ativar{% endif %}">
    {% if e.ativa %}
      <span class="badge bg-success">Ativa</span>
    {% else %}
      <span class="badge bg-warning text-dark">Inativa</span>
    {% endif %}
  </button>
</td>
