{% extends "base.html" %}
{% load fechamento_extras %}

{% block title %}Indicadores CEIPIM{% endblock %}

{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
<style>
  /* Base Badge Styling */
  .ceipim-badge {
    border-radius: 50rem;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.25rem 0.6rem;
    border: none;
    transition: all 0.2s ease-in-out;
  }
  button.ceipim-badge:hover { filter: brightness(0.95); cursor: pointer; }
  
  /* Status Colors */
  .status-na { background-color: #f1f3f5; color: #adb5bd; }
  .status-previa { background-color: #fff3cd; color: #856404; }
  .status-retificado { background-color: #cce5ff; color: #004085; }
  .status-definitivo { background-color: #d4edda; color: #155724; }
  
  /* Flash animation on update */
  @keyframes flash-success {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
    50% { transform: scale(1.1); box-shadow: 0 0 0 5px rgba(40, 167, 69, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
  }
  .flash-success {
    animation: flash-success 0.4s ease-out;
  }
  
  /* Sticky column for horizontal scrolling */
  .sticky-col-empresa {
    position: sticky;
    left: 0;
    background-color: #fff !important;
    z-index: 1;
    box-shadow: inset -1px 0 0 rgba(0,0,0,0.1);
  }
  .table-light .sticky-col-empresa {
    background-color: #f8f9fa !important;
  }
  /* Alargar container nesta tela para evitar scroll horizontal em monitores normais */
  @media (min-width: 992px) {
    .container { max-width: 98% !important; }
  }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
  <h4 class="mb-0">Indicadores CEIPIM</h4>
  <form method="get" class="d-flex align-items-center gap-2">
    <label class="small text-muted mb-0">Ano:</label>
    <select name="ano" class="form-select form-select-sm" style="width: auto;" onchange="this.form.submit()">
      {% for a in anos_disponiveis %}
        <option value="{{ a }}" {% if a == ano %}selected{% endif %}>{{ a }}</option>
      {% endfor %}
    </select>
  </form>
</div>

<div id="ceipim-container">
  {% include "fechamento/ceipim/_conteudo.html" %}
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script>
(function () {
  function atualizarContagem() {
    var checkeds = document.querySelectorAll('.ceipim-check:checked').length;
    var span = document.getElementById('contagem-ceipim');
    if (span) span.textContent = checkeds;
    
    var bulkBar = document.getElementById('bulk-action-bar');
    if (bulkBar) {
      if (checkeds > 0) {
        bulkBar.classList.remove('d-none');
        // Adiciona uma leve animação de entrada
        bulkBar.style.animation = 'fadeIn 0.3s';
      } else {
        bulkBar.classList.add('d-none');
      }
    }
  }

  // Monitora alterações nos checkboxes para mostrar/ocultar a barra em lote
  document.addEventListener('change', function (e) {
    if (e.target.classList && e.target.classList.contains('ceipim-check')) atualizarContagem();
  });
  
  // Ações de "Marcar/Desmarcar todas"
  document.addEventListener('click', function (e) {
    if (e.target.matches('[data-marcar-todas]') || e.target.matches('[data-desmarcar-todas]')) {
      e.preventDefault();
      var marcar = e.target.matches('[data-marcar-todas]');
      document.querySelectorAll('.ceipim-check').forEach(function (c) { c.checked = marcar; });
      // Se for a checkbox do Thead, marcar as de baixo
      if (e.target.tagName === 'INPUT') {
          e.target.checked = marcar;
      }
      atualizarContagem();
    }
  });

  // Função para atualizar visualmente o badge ao clicar no dropdown (antes do HTMX concluir)
  window.updateBadge = function(btnId, val, label) {
    var btn = document.getElementById(btnId);
    if(btn) {
       btn.className = 'dropdown-toggle ceipim-badge status-' + val;
       btn.textContent = label;
       // Dispara animação de sucesso
       btn.classList.remove('flash-success');
       void btn.offsetWidth; // Força o reflow do DOM para reiniciar a animação
       btn.classList.add('flash-success');
       
       // Fecha o menu dropdown após a seleção
       var bsDropdown = bootstrap.Dropdown.getInstance(btn);
       if (bsDropdown) {
           bsDropdown.hide();
       } else {
           // Fallback se a API falhar
           btn.click();
       }
    }
  }

  // CSS dinâmico para o fadeIn
  var style = document.createElement('style');
  style.innerHTML = '@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }';
  document.head.appendChild(style);

  // Lógica para a scrollbar superior
  function initTopScrollbar() {
    var topWrapper = document.querySelector('.top-scrollbar-wrapper');
    var topContent = document.querySelector('.top-scrollbar-content');
    var tableContainer = document.querySelector('.ceipim-table-container');
    var table = document.getElementById('ceipim-table');
    
    if (topWrapper && topContent && tableContainer && table) {
      function syncWidth() {
        topContent.style.width = table.offsetWidth + 'px';
      }
      syncWidth();
      window.addEventListener('resize', syncWidth);
      
      var isSyncingTop = false;
      var isSyncingBottom = false;
      
      topWrapper.addEventListener('scroll', function() {
        if (!isSyncingTop) {
          isSyncingBottom = true;
          tableContainer.scrollLeft = topWrapper.scrollLeft;
        }
        isSyncingTop = false;
      });
      
      tableContainer.addEventListener('scroll', function() {
        if (!isSyncingBottom) {
          isSyncingTop = true;
          topWrapper.scrollLeft = tableContainer.scrollLeft;
        }
        isSyncingBottom = false;
      });
    }
  }
  
  // Lógica para inicializar o Tom Select
  function initEmpresaSelect() {
    var sel = document.getElementById('ceipim-empresa-select');
    if (sel && !sel.tomselect) {
      new TomSelect(sel, {
        create: false,
        placeholder: 'Digite para buscar...'
      });
    }
  }

  initTopScrollbar();
  initEmpresaSelect();
  document.body.addEventListener('htmx:afterSwap', function(e) {
      if (e.detail.target.id === 'ceipim-container') {
          initTopScrollbar();
          initEmpresaSelect();
      }
  });

})();
</script>
{% endblock %}
